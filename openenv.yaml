spec_version: 1

# ---------------------------------------------------------------------------
# Environment identity
# ---------------------------------------------------------------------------
name:        fire-swarm-simulator
version:     "0.1.0"
description: >
  Decentralised MARL UAV Firefighting Environment.
  Features Cellular Automata fire spread (wind-biased Bernoulli),
  Ornstein-Uhlenbeck wind evolution, Gilbert-Elliott two-state Markov DDS
  modeling, kinematic speed constraint (MAX_SPEED=2 cells/step), and
  deterministic programmatic graders. Each episode uses an isolated
  np.random.default_rng(seed) instance — fully thread-safe under concurrent
  grading with SUPPORTS_CONCURRENT_SESSIONS=True.

# ---------------------------------------------------------------------------
# Runtime
# ---------------------------------------------------------------------------
type:    space
runtime: fastapi
app:     server.app:app
port:    7860

# ---------------------------------------------------------------------------
# Hardware
# ---------------------------------------------------------------------------
hardware_tier: cpu-upgrade

# ---------------------------------------------------------------------------
# Concurrency
# ---------------------------------------------------------------------------
max_concurrent_envs: 4

# ---------------------------------------------------------------------------
# Tasks (easy → medium → hard with programmatic graders)
# ---------------------------------------------------------------------------
tasks:
  - id:          easy
    description: >
      Single-drone, 15×15 grid, 1 fire seed placed near drone spawn (row gs//4=3),
      slow fire spread (base_ignite=0.05, wind_mult=0.8, t_burn=10).
      Drone spawns at row 0 and can reach the fire in 2 steps (Chebyshev distance ≤ 3
      with MAX_SPEED=2). Agent must suppress the fire and any secondary spread within
      40 steps. Designed to be genuinely achievable by a single LLM-guided drone.
    difficulty:  easy
    max_steps:   40
    grader:      programmatic
    score_range: [0.0, 1.0]
    grader_formula: >
      score = 0.35×fire_suppression_ratio (vs NOP baseline)
            + 0.25×(1 − burned_cells/225)
            + 0.20×normalised_cumulative_reward
            + 0.20×completion_bonus (1.0=all fires out, 0.5=beat baseline)

  - id:          medium
    description: >
      Three-drone swarm, 20×20 grid, 5 fire seeds, moderate burn (t_burn=6), 1.5× wind.
      Drones spawn at row 0 evenly spaced; fires in lower 2/3. MAX_SPEED=2 forces
      ≥4 navigation steps. Coordinate suppression within 50 steps.
    difficulty:  medium
    max_steps:   50
    grader:      programmatic
    score_range: [0.0, 1.0]
    grader_formula: >
      score = 0.35×fire_suppression_ratio (vs NOP baseline)
            + 0.25×(1 − burned_cells/400)
            + 0.20×normalised_cumulative_reward
            + 0.20×completion_bonus (1.0=all fires out, 0.5=beat baseline)

  - id:          hard
    description: >
      Five-drone swarm, 25×25 grid, 8 fire seeds spread across all quadrants, fast burn
      (t_burn=5), double wind (wind_mult=2.0, shamal scenario), base_ignite=0.10.
      MAX_SPEED=2 forces ≥5 navigation steps before first pump; CA spread causes fires
      to peak at 4× initial count (33 active cells) before suppression begins.
      Drones carry 10 kg retardant and must coordinate multi-hop refuelling at corner
      stations while fires relapse. Gilbert-Elliott DDS model degrades ~40% of
      BEST_EFFORT broadcasts, requiring coordination under stale peer telemetry.
      Coordinate all five drones to suppress every fire within 70 steps.
    difficulty:  hard
    max_steps:   70
    grader:      programmatic
    score_range: [0.0, 1.0]
    grader_formula: >
      score = 0.35×fire_suppression_ratio (vs NOP baseline)
            + 0.25×(1 − burned_cells/625)
            + 0.20×normalised_cumulative_reward
            + 0.20×completion_bonus (1.0=all fires out, 0.5=beat baseline)

# ---------------------------------------------------------------------------
# Environment variables (declared for HF Spaces secrets UI)
# ---------------------------------------------------------------------------
env:
  API_BASE_URL:
    description: "OpenAI-compatible LLM API base URL (default: https://api.openai.com/v1)"
    required: false
    default: "https://api.openai.com/v1"
  MODEL_NAME:
    description: "LLM model identifier (default: gpt-4o-mini)"
    required: false
    default: "gpt-4o-mini"
  HF_TOKEN:
    description: "Bearer token / API key for the LLM inference endpoint (mandatory — set via HF Spaces secrets)"
    required: true
  OPENENV_ENDPOINT:
    description: "Base URL of this environment server (default: http://localhost:7860)"
    required: false
    default: "http://localhost:7860"
  WORKERS:
    description: "Uvicorn worker count (default: 1)"
    required: false
    default: "1"
